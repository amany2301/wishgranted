<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Wishgranted OG Image</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&family=JetBrains+Mono:wght@400;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    background: #2A2018;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: 'IM Fell English', Georgia, serif;
  }

  .og-image {
    width: 1200px;
    height: 630px;
    position: relative;
    overflow: hidden;
    background:
      radial-gradient(ellipse at 25% 20%, rgba(180, 140, 80, 0.18) 0%, transparent 55%),
      radial-gradient(ellipse at 75% 80%, rgba(139, 26, 26, 0.10) 0%, transparent 60%),
      #F4EBD9;
    color: #1A1410;
    padding: 60px 70px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    flex-shrink: 0;
  }

  .og-image::before {
    content: "";
    position: absolute;
    inset: 0;
    pointer-events: none;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='240' height='240'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.7' numOctaves='3' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.4  0 0 0 0 0.3  0 0 0 0 0.2  0 0 0 0.5 0'/></filter><rect width='100%25' height='100%25' filter='url(%23n)' opacity='0.6'/></svg>");
    opacity: 0.22;
    mix-blend-mode: multiply;
  }

  .og-image::after {
    content: "";
    position: absolute;
    inset: 0;
    pointer-events: none;
    background: radial-gradient(ellipse at center, transparent 50%, rgba(60, 40, 25, 0.08) 100%);
  }

  .top-row {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    position: relative;
    z-index: 2;
  }

  .brand-mark {
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.32em;
    text-transform: uppercase;
    color: #8B7E6F;
  }

  .stars {
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    letter-spacing: 0.4em;
    color: #8B6914;
  }

  .center {
    text-align: center;
    position: relative;
    z-index: 2;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }

  .eyebrow {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: #8B1A1A;
    margin-bottom: 4px;
  }

  .wordmark {
    font-family: 'IM Fell English', serif;
    font-style: italic;
    font-size: 132px;
    line-height: 0.95;
    letter-spacing: 0.01em;
    color: #1A1410;
    text-shadow: 0 2px 0 rgba(180, 140, 80, 0.18);
  }

  .tagline {
    font-family: 'IM Fell English', serif;
    font-style: italic;
    font-size: 24px;
    color: #4A3F35;
    margin-top: 6px;
    letter-spacing: 0.02em;
  }

  .rule-preview {
    background: rgba(255, 248, 230, 0.65);
    border-left: 4px solid #8B1A1A;
    border-radius: 0 4px 4px 0;
    padding: 14px 22px;
    text-align: left;
    max-width: 720px;
    margin: 22px auto 0;
    box-shadow: 0 1px 0 rgba(60, 40, 25, 0.08);
  }

  .rule-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: #8B1A1A;
    margin-bottom: 4px;
  }

  .rule-text {
    font-family: 'IM Fell English', serif;
    font-size: 22px;
    color: #1A1410;
    line-height: 1.35;
  }

  .bottom-row {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    position: relative;
    z-index: 2;
  }

  .url {
    font-family: 'JetBrains Mono', monospace;
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 0.12em;
    color: #1A1410;
  }

  .meta {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: #8B7E6F;
    text-align: right;
  }

  .meta strong {
    color: #1A1410;
    font-weight: 700;
  }

  .divider {
    color: #8B6914;
    margin: 0 10px;
  }

  /* responsive scaling stripped — the file is rendered to PNG at native 1200x630 */
</style>
</head>
<body>

<div class="og-image">

  <div class="top-row">
    <div class="brand-mark">A NEAL.FUN-STYLE PUZZLE</div>
    <div class="stars">✦ &nbsp; ✦ &nbsp; ✦</div>
  </div>

  <div class="center">
    <div class="eyebrow">A genie awaits your request</div>
    <div class="wordmark">Wishgranted</div>
    <div class="tagline">Ten wishes. One impossible final wish.</div>

    <div class="rule-preview">
      <div class="rule-num">No. 08 — Failed</div>
      <div class="rule-text">Your wish must not contain the letter 'e'.</div>
    </div>
  </div>

  <div class="bottom-row">
    <div class="url">wishgranted.vizleo.com</div>
    <div class="meta"><strong>50 RULES</strong> <span class="divider">·</span> <strong>10 LEVELS</strong> <span class="divider">·</span> <strong>1 GAUNTLET</strong></div>
  </div>

</div>

</body>
</html>
