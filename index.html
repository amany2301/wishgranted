<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#F4EBD9">
<meta name="description" content="A 10-level puzzle game. Write a wish. Satisfy the genie. Then face the final wish.">
<title>Wishgranted</title>

<link rel="canonical" href="https://wishgranted.vizleo.com">

<meta property="og:title" content="Wishgranted — the genie is impossible to please">
<meta property="og:description" content="A 10-level puzzle game. Write a wish. Satisfy the genie. Then face the final wish.">
<meta property="og:image" content="https://wishgranted.vizleo.com/assets/og-image.png">
<meta property="og:url" content="https://wishgranted.vizleo.com">
<meta property="og:type" content="website">

<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="Wishgranted — the genie is impossible to please">
<meta name="twitter:description" content="A 10-level puzzle game. Write a wish. Satisfy the genie. Then face the final wish.">
<meta name="twitter:image" content="https://wishgranted.vizleo.com/assets/og-image.png">

<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "VideoGame",
  "name": "Wishgranted",
  "url": "https://wishgranted.vizleo.com",
  "description": "A 10-level puzzle game. Write a wish. Satisfy the genie. Then face the final wish.",
  "applicationCategory": "Game",
  "genre": "Puzzle",
  "operatingSystem": "Any (web browser)",
  "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" }
}
</script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css?v=4">
</head>
<body>

<main>
  <div class="topbar">
    <div class="level-num" id="level-num">No. 001</div>
    <div class="level-progress" id="level-progress">— / 10</div>
  </div>

  <div class="header">
    <div class="title" id="title">Wishgranted</div>
    <div class="subtitle" id="subtitle">A genie awaits your request</div>
  </div>

  <div id="game">
    <div class="wish-area">
      <label class="wish-label" for="wish">Your wish</label>
      <textarea id="wish" class="wish-input" placeholder="I wish for..." autocomplete="off" autocapitalize="off" spellcheck="false" aria-label="Your wish"></textarea>
      <div class="wish-meta">
        <span id="char-count">0 chars</span>
        <span id="rule-status"><span class="meta-passed">0 passed</span> · <span class="meta-failed">0 unmet</span></span>
      </div>
      <div class="hint-help" id="hint-help">5 hints total in the entire game · tap “— reveal hint —” under any failing rule</div>
    </div>

    <div id="genie-speech-area" aria-live="polite" aria-atomic="true"></div>

    <div class="rules-section">
      <div class="section-divider"><hr><span id="rules-section-label">Conditions</span><hr></div>
      <div id="rules-list" aria-live="polite"></div>
    </div>

    <button id="grant-btn" class="grant-btn" disabled>The genie awaits your conditions</button>
  </div>

  <div id="victory" style="display: none;"></div>

  <footer class="footer">
    <span class="footer-credit">made with care · 2026</span>
  </footer>
</main>

<div id="toast" class="toast" role="status" aria-live="polite"></div>

<script src="js/rules.js?v=4"></script>
<script src="js/levels.js?v=4"></script>
<script src="js/genie.js?v=4"></script>
<script src="js/state.js?v=4"></script>
<script src="js/ui.js?v=4"></script>
<script src="js/app.js?v=4"></script>
</body>
</html>
