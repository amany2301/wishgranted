<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#F4EBD9">
<meta name="robots" content="noindex, follow">
<title>Page not found — Wishgranted</title>
<link rel="canonical" href="https://wishgranted.vizleo.com/">
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<link rel="icon" href="/favicon-32.png" type="image/png" sizes="32x32">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root { --paper: #F4EBD9; --ink: #1A1410; --ink-soft: #4A3F35; --ink-faded: #8B7E6F; --blood: #8B1A1A; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { min-height: 100vh; min-height: 100dvh; }
  body {
    font-family: 'IM Fell English', Georgia, serif;
    color: var(--ink);
    background:
      radial-gradient(ellipse at 30% 20%, rgba(180, 140, 80, 0.12) 0%, transparent 50%),
      radial-gradient(ellipse at 70% 80%, rgba(139, 26, 26, 0.06) 0%, transparent 60%),
      var(--paper);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 24px;
    text-align: center;
  }
  .wrap { max-width: 460px; }
  .eyebrow {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--blood);
    margin-bottom: 16px;
  }
  h1 {
    font-style: italic;
    font-size: 44px;
    line-height: 1.15;
    color: var(--ink);
    margin-bottom: 16px;
    font-weight: 400;
  }
  p {
    font-style: italic;
    font-size: 17px;
    line-height: 1.6;
    color: var(--ink-soft);
    margin-bottom: 28px;
  }
  a.home {
    display: inline-block;
    padding: 14px 28px;
    background: var(--ink);
    color: var(--paper);
    font-style: italic;
    font-size: 17px;
    text-decoration: none;
    border-radius: 2px;
    transition: background 0.2s ease;
  }
  a.home:hover { background: var(--blood); }
  .footer {
    margin-top: 40px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--ink-faded);
  }
</style>
</head>
<body>
  <div class="wrap">
    <div class="eyebrow">Error 404</div>
    <h1>The genie cannot grant that page.</h1>
    <p>It was never written, or it has already been wished away. The genie suggests you return to the beginning.</p>
    <a class="home" href="/">Back to Wishgranted</a>
    <div class="footer">made with care · 2026</div>
  </div>
</body>
</html>
